name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Static code analysis
            task: lint
          - name: Type checking
            task: typecheck
          - name: Unit tests
            task: unit
          - name: Build
            task: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v3
        with:
          github_token: ${{ github.token }}

      - name: Install project dependencies
        run: mise run install

      - name: Run ${{ matrix.task }}
        run: mise run ${{ matrix.task }}
